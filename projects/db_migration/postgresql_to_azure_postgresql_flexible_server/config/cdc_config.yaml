# CDC configuration for PostgreSQL -> Azure PostgreSQL Flexible Server
# Author: Nitish Anand Srivastava

source:
  host: onprem-pg01
  port: 5432
  database: salesdb
  slot_name: mig_slot_01
  publication_name: mig_pub_01
  start_lsn: "0/7000000"

extractor:
  batch_size: 10000
  poll_interval_seconds: 5
  output_queue_file: logs/cdc_changes.jsonl

replay:
  target_host: pg-flex-prod.postgres.database.azure.com
  target_port: 5432
  target_database: salesdb
  batch_size: 5000
  idempotency_mode: upsert

monitoring:
  lag_target_minutes: 5
  lag_alert_minutes: 15
